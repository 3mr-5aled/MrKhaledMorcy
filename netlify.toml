[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  # Include necessary files for Prisma
  included_files = ["prisma/schema.prisma", ".env", ".env.production"]
  # Use external node modules to reduce bundle size
  external_node_modules = ["@prisma/client", "sharp", "bcrypt"]
  node_bundler = "esbuild"

# Scheduled function to auto-publish answers
# Runs every 10 minutes to check for scheduled answers that need to be published
[[scheduled_functions]]
  path = "/api/cron/publish-answers"
  schedule = "*/10 * * * *"  # Every 10 minutes
  # Note: Make sure to set CRON_SECRET environment variable in Netlify

# Scheduled function to auto-publish quizzes
# Runs every 10 minutes to check for scheduled quizzes that need to be published
[[scheduled_functions]]
  path = "/api/cron/publish-quizzes"
  schedule = "*/10 * * * *"  # Every 10 minutes

# Scheduled function to cleanup orphaned files and old versions
# Runs daily at 2 AM to clean up orphaned files and prune old versions
[[scheduled_functions]]
  path = "/api/cron/cleanup-files"
  schedule = "0 2 * * *"  # Daily at 2 AM UTC

